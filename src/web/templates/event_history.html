{% extends "base.html" %}

{% block title %}Historial de Eventos{% endblock %}

{% block content %}
<h2 class="mb-4">
    <i class="bi bi-clock-history me-2"></i>Historial de Eventos
</h2>

<!-- Filter form -->
<div class="card shadow-sm mb-4">
    <div class="card-header bg-dark text-white">
        <i class="bi bi-funnel me-2"></i>Filtros
    </div>
    <div class="card-body">
        <form id="filter-form" hx-get="/partials/events-table" hx-target="#events-table-body" hx-swap="innerHTML"
            hx-indicator="#filter-spinner" hx-trigger="submit">
            <div class="row g-3">

                <div class="col-12 col-md-4">
                    <label for="event_type" class="form-label fw-semibold small">Tipo de evento</label>
                    <select class="form-select form-select-sm" id="event_type" name="event_type">
                        <option value="">— Todos —</option>
                        {% for et in event_types %}
                        <option value="{{ et }}">{{ et | replace('_', ' ') | title }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-12 col-md-4">
                    <label for="description" class="form-label fw-semibold small">Descripción contiene</label>
                    <input type="text" class="form-control form-control-sm" id="description" name="description"
                        placeholder="Buscar en descripción…" />
                </div>

                <div class="col-6 col-md-2">
                    <label for="date_from" class="form-label fw-semibold small">Desde</label>
                    <input type="date" class="form-control form-control-sm" id="date_from" name="date_from" />
                </div>

                <div class="col-6 col-md-2">
                    <label for="date_to" class="form-label fw-semibold small">Hasta</label>
                    <input type="date" class="form-control form-control-sm" id="date_to" name="date_to" />
                </div>

            </div>

            <div class="d-flex align-items-center gap-3 mt-3">
                <button type="submit" class="btn btn-dark btn-sm">
                    <i class="bi bi-search me-1"></i>Aplicar filtros
                </button>
                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="clearFilters()">
                    <i class="bi bi-x-circle me-1"></i>Limpiar
                </button>
                <a id="export-btn" href="/api/v1/events/export" class="btn btn-outline-success btn-sm ms-auto">
                    <i class="bi bi-file-earmark-excel me-1"></i>Exportar a Excel
                </a>
                <div id="filter-spinner" class="htmx-indicator d-flex align-items-center gap-2">
                    <div class="spinner-border spinner-border-sm text-secondary" role="status">
                        <span class="visually-hidden">Cargando…</span>
                    </div>
                    <span class="text-muted small">Cargando…</span>
                </div>
            </div>
        </form>
    </div>
</div>

<!-- Events table -->
<div class="card shadow-sm">
    <div class="card-header bg-white d-flex align-items-center justify-content-between">
        <span class="fw-semibold">Eventos</span>
        <span id="events-count" class="badge bg-secondary">—</span>
    </div>
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
                <tr>
                    <th style="width: 110px;">ID</th>
                    <th>Tipo</th>
                    <th>Descripción</th>
                    <th>Usuario</th>
                    <th>Fecha y hora</th>
                </tr>
            </thead>
            <tbody id="events-table-body">
                <tr>
                    <td colspan="5" class="text-center text-muted py-4">
                        Aplicá los filtros para ver eventos.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Pagination (rendered by HTMX partial) -->
<div id="events-pagination" class="mt-3"></div>

<script>
    function clearFilters() {
        document.getElementById('event_type').value = '';
        document.getElementById('description').value = '';
        document.getElementById('date_from').value = '';
        document.getElementById('date_to').value = '';
        updateExportLink();
    }

    function updateExportLink() {
        const form = document.getElementById('filter-form');
        const data = new FormData(form);
        const params = new URLSearchParams();
        for (const [k, v] of data.entries()) {
            if (v) params.append(k, v);
        }
        const qs = params.toString();
        document.getElementById('export-btn').href =
            '/api/v1/events/export' + (qs ? '?' + qs : '');
    }

    // Keep export link in sync with filter values
    document.getElementById('filter-form').addEventListener('change', updateExportLink);
    document.getElementById('filter-form').addEventListener('input', updateExportLink);
</script>
{% endblock %}
