<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión — PruebaTecnica</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/app.css" />

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"
        integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2uiTulwnmVE906F1i0Nvt4kEsGwgv5fFVQh"
        crossorigin="anonymous"></script>

    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
    </style>
</head>

<body>
    <div class="card shadow" style="width: 100%; max-width: 420px;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <h4 class="fw-bold">PruebaTecnica</h4>
                <p class="text-muted mb-0">OneCore — Iniciar sesión</p>
            </div>

            <!-- Alert placeholder populated by HTMX or JS -->
            <div id="login-alert"></div>

            <form hx-post="/api/v1/auth/login" hx-target="#login-alert" hx-swap="innerHTML"
                hx-indicator="#login-spinner" hx-ext="json-enc" id="login-form">
                <div class="mb-3">
                    <label for="username" class="form-label">Usuario</label>
                    <input type="text" class="form-control" id="username" name="username"
                        placeholder="nombre_de_usuario" required autocomplete="username" />
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="••••••••"
                        required autocomplete="current-password" />
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-dark">
                        <span id="login-spinner" class="spinner-border spinner-border-sm me-2 htmx-indicator"
                            role="status" aria-hidden="true"></span>
                        Entrar
                    </button>
                </div>
            </form>

            <p class="text-center text-muted small mt-3 mb-0">
                PruebaTecnica &mdash; OneCore
            </p>
        </div>
    </div>

    <!-- Bootstrap 5 JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmqXABB78iUovCLHDEHqV3Hmm6i"
        crossorigin="anonymous"></script>
    <!-- Custom JS (handles htmx:afterRequest for token storage) -->
    <script src="/static/js/app.js"></script>
</body>

</html>
